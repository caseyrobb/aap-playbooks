---
- name: Initial Vault Configuration
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vault.yml

  tasks:
    - name: Enable KV v2 Secret Engine
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/mounts/{{ kv_engine_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          type: kv
          options:
            version: "2"
        status_code: [200, 204, 400]
      register: kv_mount
      failed_when:
        - kv_mount.status == 400
        - "'path is already in use' not in kv_mount.json.errors | default([]) | join('')"

    - name: Create Superuser Admin Policy
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/policies/acl/superuser-admin"
        method: PUT
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          policy: |
            path "*" {
              capabilities = ["create", "read", "update", "delete", "list", "sudo"]
            }
        status_code: [200, 204]

    - name: Create ESO Read-Only Policy
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/policies/acl/eso-readonly"
        method: PUT
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          policy: |
            path "{{ kv_engine_path }}/data/*" {
              capabilities = ["read"]
            }
            path "{{ kv_engine_path }}/metadata/*" {
              capabilities = ["read", "list"]
            }
        status_code: [200, 204]

    - name: Enable Userpass Auth Method
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/auth/userpass"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          type: userpass
        status_code: [200, 204, 400]
      register: userpass_auth
      failed_when:
        - userpass_auth.status == 400
        - "'path is already in use' not in userpass_auth.json.errors | default([]) | join('')"

    - name: Enable Kubernetes Auth Method
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/auth/kubernetes"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          type: kubernetes
        status_code: [200, 204, 400]
      register: k8s_auth
      failed_when:
        - k8s_auth.status == 400
        - "'path is already in use' not in k8s_auth.json.errors | default([]) | join('')"

    - name: Create Web UI Superuser
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/auth/userpass/users/{{ admin_username }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          password: "{{ admin_password }}"
          policies: ["superuser-admin"]
        status_code: [200, 204]

    - name: Configure Kubernetes Auth Method
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/auth/kubernetes/config"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          kubernetes_host: "{{ k8s_host_url }}"
        status_code: [200, 204]

    - name: Create Kubernetes Auth Role for ESO
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/auth/kubernetes/role/external-secrets-role"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          bound_service_account_names: ["{{ eso_service_account }}"]
          bound_service_account_namespaces: ["{{ eso_namespace }}"]
          policies: ["eso-readonly"]
          ttl: "1h"
        status_code: [200, 204]
